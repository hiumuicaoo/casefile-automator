# Triển khai "Quản lý hồ sơ giám định" trên Ubuntu server.
#
# ┌─ App web (dashboard) ─────── cổng 5000 (trong tailnet)
# ├─ PostgreSQL database ─────── data lưu ở /var/lib/casefile-db (trên host)
# └─ Biểu mẫu Word (2 bộ) ────── lưu ở /var/lib/casefile-templates/... (trên host)
#
# Chạy:
#   sudo mkdir -p /var/lib/casefile-db \
#                 /var/lib/casefile-templates/BIEUMAU_TRUONGPHONG \
#                 /var/lib/casefile-templates/BIEUMAU_PHOTRUONGPHONG
#   # -> upload 8 file .docx của "Trưởng phòng" vào BIEUMAU_TRUONGPHONG/
#   # -> upload 8 file .docx của "Phó Trưởng phòng" vào BIEUMAU_PHOTRUONGPHONG/
#   docker compose up -d --build
#   # Truy cập: http://<hostname-tailscale>:5000  (vd: http://giamdinh:5000)

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-giamdinh}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME:-giamdinh}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--advertise-tags=tag:giamdinh
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_DB=casefile_db
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.UTF-8
    volumes:
      # 📁 DỮ LIỆU DATABASE — lưu trực tiếp trên host Ubuntu
      #    Toàn bộ hồ sơ dashboard tạo ra ở đây (không đâu khác).
      - /var/lib/casefile-db:/var/lib/postgresql/data
      # Script khởi tạo schema (chỉ chạy khi volume rỗng)
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Mở 5432 để .exe trên Windows kết nối trực tiếp qua Tailscale.
      # LƯU Ý: dùng ufw để chặn 5432 từ Internet nếu server có IP public.
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      tailscale:
        condition: service_started
    ports:
      - "5000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # ===== Database local (PostgreSQL) =====
      - DATABASE_URL=postgresql://postgres@postgres:5432/casefile_db
    volumes:
      # 📁 BIỂU MẪU WORD — mount từ host vào container ở /app/templates
      #    Upload file .docx vào 2 thư mục dưới đây trên server Ubuntu:
      #      /var/lib/casefile-templates/BIEUMAU_TRUONGPHONG/       (khi lãnh đạo ký là "Trưởng phòng")
      #      /var/lib/casefile-templates/BIEUMAU_PHOTRUONGPHONG/    (khi lãnh đạo ký là "Phó Trưởng phòng")
      #    Đúng 8 file mỗi thư mục, tên trùng khớp danh sách trong src/lib/word-processor.ts
      - /var/lib/casefile-templates:/app/templates:ro
    restart: unless-stopped

volumes:
  tailscale-state:
