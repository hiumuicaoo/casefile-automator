# Triển khai "Quản lý hồ sơ giám định" trên Ubuntu server
# - App chạy sau Tailscale sidecar (network_mode: service:tailscale)
# - Chỉ expose cổng 5000 trong tailnet (không public ra Internet)
# - PostgreSQL database lưu trữ dữ liệu trên server (/var/lib/casefile-db)
#
# Sử dụng:
#   docker compose up -d --build
#   # Sau đó truy cập: http://<hostname-tailscale>:5000  (vd: http://giamdinh:5000)

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TS_HOSTNAME:-giamdinh}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME:-giamdinh}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--advertise-tags=tag:giamdinh
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    hostname: postgres
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_DB=casefile_db
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=en_US.UTF-8
    volumes:
      # 📁 Dữ liệu database được lưu trữ tại /var/lib/casefile-db trên server Ubuntu
      - /var/lib/casefile-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      tailscale:
        condition: service_started
    ports:
      - "5000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # ===== Database Local (PostgreSQL trên server) =====
      - DATABASE_URL=postgresql://postgres@postgres:5432/casefile_db
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=casefile_db
      # ===== Supabase (nếu vẫn dùng) =====
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_PUBLISHABLE_KEY=${VITE_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped

volumes:
  tailscale-state:
